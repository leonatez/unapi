version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "1113:1113"
    env_file:
      - ./backend/.env
    volumes:
      - uploads:/tmp/unapi_uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "1114:1114"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:1113/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
